name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/scraping-platform

jobs:
  # ── 1. Run full CI gate first ─────────────────────────────────────────────
  ci-gate:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  # ── 2. Build & push Docker images ────────────────────────────────────────
  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: ci-gate
    permissions:
      contents: read
      packages: write

    outputs:
      backend-tag:  ${{ steps.meta-backend.outputs.tags }}
      frontend-tag: ${{ steps.meta-frontend.outputs.tags }}
      sha-short:    ${{ steps.sha.outputs.short }}

    steps:
      - uses: actions/checkout@v4

      - name: Short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend image metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Frontend image metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ steps.sha.outputs.short }}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── 3. E2E tests against staging ─────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    if: github.event.inputs.environment != 'production'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install test deps
        run: |
          pip install playwright pytest-playwright allure-pytest
          playwright install chromium --with-deps

      - name: Start test stack
        run: |
          cp .env.example .env
          docker compose up -d db redis backend celery_worker
          sleep 15
          docker compose exec -T backend alembic upgrade head
          docker compose exec -T backend python -c "
          from sqlalchemy import create_engine
          from sqlalchemy.orm import Session
          from app.core.database import Base
          from app.models.user import User, UserRole
          from app.core.security import hash_password
          engine = create_engine('postgresql://scraping:scraping_pass@localhost:5432/scraping_platform')
          Base.metadata.create_all(engine)
          with Session(engine) as s:
              s.add(User(email='e2e@test.com', hashed_password=hash_password('e2etest123'), role=UserRole.admin))
              s.commit()
          print('E2E user created')
          "

      - name: Run E2E tests
        env:
          BASE_URL:  http://localhost:8000
          E2E_EMAIL: e2e@test.com
          E2E_PASS:  e2etest123
        run: pytest tests/e2e/ -v --alluredir=allure-results

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-e2e
          path: allure-results/

      - name: Generate Allure report
        if: always()
        run: |
          npm install -g allure-commandline
          allure generate allure-results --clean -o allure-report

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  # ── 4. Deploy to staging ──────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: [build, e2e]
    environment:
      name: staging
      url: https://staging.scraping-platform.example.com
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key:      ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd /opt/scraping-platform

            # Pull latest images
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:latest
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest

            # Update compose to use registry images
            export BACKEND_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:latest
            export FRONTEND_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest

            # Rolling restart
            docker compose -f docker-compose.prod.yml up -d --no-build \
              backend celery_worker celery_beat frontend

            # Run pending migrations
            docker compose -f docker-compose.prod.yml exec -T backend \
              alembic upgrade head

            # Health check
            sleep 10
            curl -f http://localhost:8000/api/v1/health || (docker compose logs backend && exit 1)

            echo "✓ Staging deployment complete — SHA ${{ needs.build.outputs.sha-short }}"

  # ── 5. Deploy to production (manual approval required) ───────────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
      url: https://scraping-platform.example.com
    if: github.event.inputs.environment == 'production'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key:      ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd /opt/scraping-platform

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:latest
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest

            # Blue-green swap: bring up new, verify, drop old
            docker compose -f docker-compose.prod.yml up -d --no-build --scale backend=2
            sleep 15
            curl -f http://localhost:8000/api/v1/health
            docker compose -f docker-compose.prod.yml up -d --no-build --scale backend=1

            docker compose -f docker-compose.prod.yml exec -T backend alembic upgrade head

            echo "✓ Production deployment complete"

      - name: Notify on success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              sha:   context.sha,
              state: 'success',
              description: 'Production deployment succeeded',
              context: 'deploy/production',
            })
