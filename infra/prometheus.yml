global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    environment: "local"

rule_files:
  - "rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []  # wire up alertmanager when ready

scrape_configs:
  - job_name: "scraping_backend"
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics

  - job_name: "celery_workers"
    static_configs:
      - targets: ["flower:5555"]
    metrics_path: /metrics

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
